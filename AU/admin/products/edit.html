<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新建产品推荐 - PawWell</title>
<style>* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; background: #f5f5f7; min-height: 100vh; color: #1d1d1f; }
.top-bar { background: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e5e5e7; }
.back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #0071e3; padding: 0; line-height: 1; }
.top-title { font-size: 18px; font-weight: 600; flex: 1; }
.container { padding: 20px; max-width: 600px; margin: 0 auto; }
.field { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.field-label { font-size: 13px; color: #86868b; margin-bottom: 6px; display: block; }
.field-input, .field-select, .field-textarea { width: 100%; border: none; outline: none; font-size: 16px; padding: 4px 0; background: transparent; font-family: inherit; }
.field-textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
.submit-btn { width: 100%; background: #0071e3; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }
.submit-btn:active { background: #005bb5; }
.submit-btn:disabled { background: #86868b; }
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 100; display: none; }
.toast.show { display: block; }
.msg-bar { background: #d4edda; color: #155724; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: none; font-size: 14px; }
.msg-bar.error { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" onclick="window.location.href='/AU/admin/index.html'">&#9001;</button>
  <div class="top-title">新建产品推荐</div>
</div>
<div class="container">
  <div class="msg-bar" id="msgBar"></div>
  <form id="dataForm">
    <div class="field"><label class="field-label">产品名称 *</label><input class="field-input" type="text" name="name" required placeholder="如：Hill's 老年犬专用狗粮"></div>
<div class="field"><label class="field-label">分类 *</label><select class="field-select" name="category" required><option value="">请选择</option><option value="主粮">主粮</option><option value="零食">零食</option><option value="保健品">保健品</option><option value="玩具">玩具</option><option value="医疗用品">医疗用品</option><option value="其他">其他</option></select></div>
<div class="field"><label class="field-label">品牌</label><input class="field-input" type="text" name="brand"  placeholder="如：Hill's"></div>
<div class="field"><label class="field-label">产品简介 *</label><textarea class="field-textarea" name="description" required placeholder="100字以内产品介绍"></textarea></div>
<div class="field"><label class="field-label">价格区间</label><input class="field-input" type="text" name="priceRange"  placeholder="如：$50-80"></div>
<div class="field"><label class="field-label">评分(1-5)</label><input class="field-input" type="text" name="rating"  placeholder="4.5"></div>
<div class="field"><label class="field-label">联盟链接 *</label><input class="field-input" type="text" name="affiliateUrl" required placeholder="https://..."></div>
<div class="field"><label class="field-label">产品图URL</label><input class="field-input" type="text" name="coverImage"  placeholder="https://..."></div>

    <button type="submit" class="submit-btn" id="submitBtn">保存</button>
  </form>
</div>
<div class="toast" id="toast"></div>
<script>
var CONFIG = {
  notionDbId: '3970556c-dfbd-81b9-bfc6-e186ae65b1d5',
  supabaseTable: 'product_recommendations',
  notionToken: 'ntn_b1433198525X3xFz2UNpf0I17XenT22UCC4E32kDvYI5EZ',
  supabaseUrl: 'https://cbbaejwbkenrutmgqikt.supabase.co',
  serviceKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNiYmFlandia2VucnV0bWdxaWt0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk5NzU3NCwiZXhwIjoyMDk4NTczNTc0fQ.1N3D6ahkkxYe6ykxphk_jJ4BHHshmcbTe-IrDIw6F64',
  extraNotion: {"\u72b6\u6001": {"select": {"name": "\u5f85\u53d1\u5e03"}}}
};

var notionFieldMap = {"title": "\u6807\u9898", "question": "\u95ee\u9898", "name": "\u4ea7\u54c1\u540d\u79f0", "category": "\u5206\u7c7b", "petType": "\u5ba0\u7269\u7c7b\u578b", "status": "\u72b6\u6001", "author": "\u4f5c\u8005", "petName": "\u5ba0\u7269\u540d", "petBreed": "\u54c1\u79cd", "age": "\u5e74\u9f84", "diagnosis": "\u786e\u8bca\u75be\u75c5", "summary": "\u6458\u8981", "content": "\u6b63\u6587", "answer": "\u7b54\u6848", "description": "\u7b80\u4ecb", "coverImage": "\u5c01\u9762\u56fe", "affiliateUrl": "\u8054\u76df\u94fe\u63a5", "publishedAt": "\u53d1\u5e03\u65e5\u671f", "tags": "\u6807\u7b7e"};
var richTextFields = new Set(['summary','content','answer','description']);
var urlFields = new Set(['coverImage','affiliateUrl']);
var dateFields = new Set(['publishedAt']);
var multiFields = new Set(['tags']);
var numFields = new Set(['rating']);
var tagsFields = new Set(['tags']);

var user = localStorage.getItem('pawwell_admin_user');
if (!user) window.location.href = '/AU/admin/login.html';

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function showMsg(msg, isError) {
  var m = document.getElementById('msgBar');
  m.textContent = msg;
  m.className = 'msg-bar' + (isError ? ' error' : '');
  m.style.display = 'block';
  setTimeout(function() { m.style.display = 'none'; }, 5000);
}

function slugify(text) {
  return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'untitled';
}

async function writeToNotion(formData) {
  var builtProps = {};
  for (var fname in notionFieldMap) {
    var nfield = notionFieldMap[fname];
    var val = (formData.get(fname) || '').trim();
    if (!val) continue;
    if (richTextFields.has(fname)) {
      builtProps[nfield] = { rich_text: [{ text: { content: val.slice(0,10000) } }] };
    } else if (urlFields.has(fname)) {
      builtProps[nfield] = { url: val };
    } else if (dateFields.has(fname)) {
      builtProps[nfield] = { date: { start: val } };
    } else if (multiFields.has(fname)) {
      var items = val.split(',').map(function(t) { return { name: t.trim() }; }).filter(function(t) { return t.name; });
      builtProps[nfield] = { multi_select: items };
    } else {
      builtProps[nfield] = { select: { name: val } };
    }
  }
  for (var k in CONFIG.extraNotion) builtProps[k] = CONFIG.extraNotion[k];

  var res = await fetch('https://api.notion.com/v1/pages', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + CONFIG.notionToken,
      'Content-Type': 'application/json',
      'Notion-Version': '2022-06-28'
    },
    body: JSON.stringify({ parent: { database_id: CONFIG.notionDbId }, properties: builtProps })
  });
  if (!res.ok) {
    var err = await res.json();
    throw new Error('Notion: ' + (err.message || res.status));
  }
  return await res.json();
}

async function writeToSupabase(formData) {
  var row = { country: 'AU' };
  var sfMap = {"name": "name", "category": "category", "brand": "brand", "description": "description", "priceRange": "price_range", "rating": "rating", "affiliateUrl": "affiliate_url", "coverImage": "cover_image", "status": "status"};
  for (var formField in sfMap) {
    var supaField = sfMap[formField];
    var val = (formData.get(formField) || '').trim();
    if (!val) continue;
    if (numFields.has(formField)) {
      var n = parseFloat(val);
      if (!isNaN(n)) row[supaField] = n;
    } else if (tagsFields.has(formField)) {
      var tags = val.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
      if (tags.length) row[supaField] = tags;
    } else {
      row[supaField] = val;
    }
  }
  var tv = formData.get('title') || formData.get('question') || formData.get('name') || '';
  if (tv) row.slug = slugify(tv);
  row.status = row.status || formData.get('status') || 'Draft';

  var res = await fetch(CONFIG.supabaseUrl + '/rest/v1/' + CONFIG.supabaseTable, {
    method: 'POST',
    headers: {
      'apikey': CONFIG.serviceKey,
      'Authorization': 'Bearer ' + CONFIG.serviceKey,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(row)
  });
  if (!res.ok) {
    var err = await res.text();
    throw new Error('Supabase: ' + err.slice(0, 150));
  }
  if (res.status === 201) return { ok: true };
  return await res.json();
}

document.getElementById('dataForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  var formData = new FormData(this);

  try {
    var results = await Promise.all([writeToNotion(formData), writeToSupabase(formData)]);
    showToast('\u2705 保存成功！已同步到 Notion + 网站数据库');
    this.reset();
  } catch(err) {
    showMsg('\u274c 保存失败: ' + err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '保存';
  }
});
</script>
</body>
</html>
