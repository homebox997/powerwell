<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawWell 后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background: #f5f5f7;
  min-height: 100vh;
  padding: 20px;
  color: #1d1d1f;
}
.header {
  text-align: center;
  padding: 30px 0 20px;
}
.header h1 {
  font-size: 32px;
  color: #1d1d1f;
  margin-bottom: 8px;
}
.header p {
  color: #86868b;
  font-size: 16px;
}
.user-info {
  text-align: center;
  margin-bottom: 20px;
  color: #86868b;
  font-size: 14px;
}
.user-info a {
  color: #0071e3;
  text-decoration: none;
  margin-left: 10px;
}
.user-info a:hover {
  text-decoration: underline;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  max-width: 600px;
  margin: 0 auto;
}
.card {
  background: white;
  border-radius: 18px;
  padding: 30px 20px;
  text-align: center;
  text-decoration: none;
  color: #1d1d1f;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.card:active {
  transform: scale(0.97);
  background: #f5f5f7;
}
.card-icon {
  font-size: 48px;
  line-height: 1;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
}
.card-desc {
  font-size: 12px;
  color: #86868b;
}
.footer {
  text-align: center;
  padding: 30px 0 20px;
  color: #86868b;
  font-size: 12px;
}
@media (min-width: 600px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>🐾 PawWell</h1>
  <p>后台管理系统</p>
</div>

<div class="user-info">
  <span id="userDisplay">管理员</span>
  <a href="/AU/admin/login.html" onclick="logout()">退出</a>
</div>

<div class="grid">
  <a href="/AU/admin/blog/edit.html" class="card">
    <div class="card-icon">📝</div>
    <div class="card-title">博客文章</div>
    <div class="card-desc">写新文章</div>
  </a>

  <a href="/AU/admin/pathology/edit.html" class="card">
    <div class="card-icon">🏥</div>
    <div class="card-title">病理文章</div>
    <div class="card-desc">健康指南</div>
  </a>

  <a href="/AU/admin/products/edit.html" class="card">
    <div class="card-icon">🛒</div>
    <div class="card-title">产品推荐</div>
    <div class="card-desc">联盟商品</div>
  </a>

  <a href="/AU/admin/qa/edit.html" class="card">
    <div class="card-icon">❓</div>
    <div class="card-title">问答知识</div>
    <div class="card-desc">FAQ</div>
  </a>

  <a href="/AU/admin/cases/edit.html" class="card">
    <div class="card-icon">📖</div>
    <div class="card-title">康复案例</div>
    <div class="card-desc">真实故事</div>
  </a>

  <a href="/AU/admin/leads/list.html" class="card">
    <div class="card-icon">📋</div>
    <div class="card-title">检测线索</div>
    <div class="card-desc">用户提交</div>
  </a>

  <a href="/AU/admin/community/list.html" class="card">
    <div class="card-icon">👥</div>
    <div class="card-title">社区管理</div>
    <div class="card-desc">帖子评论</div>
  </a>

  <a href="/AU/admin/breeds/list.html" class="card">
    <div class="card-icon">🐕</div>
    <div class="card-title">宠物品种</div>
    <div class="card-desc">基础数据</div>
  </a>

  <a href="/AU/admin/tags/list.html" class="card">
    <div class="card-icon">🏷️</div>
    <div class="card-title">内容标签</div>
    <div class="card-desc">分类管理</div>
  </a>

  <a href="/AU/admin/health_metrics/edit.html" class="card">
    <div class="card-icon">📊</div>
    <div class="card-title">体检指标</div>
    <div class="card-desc">健康数据</div>
  </a>

  <a href="/AU/admin/agent_profiles/edit.html" class="card">
    <div class="card-icon">🤖</div>
    <div class="card-title">智能体角色</div>
    <div class="card-desc">AI角色管理</div>
  </a>
</div>

<div class="footer">
  PawWell Admin System
</div>

<script>
// 检查登录状态
const user = localStorage.getItem('pawwell_admin_user');
if (!user) {
  // 未登录,跳转到登录页
  window.location.href = '/AU/admin/login.html';
} else {
  document.getElementById('userDisplay').textContent = user === 'admin' ? '管理员' : '录入员';
}

function logout() {
  localStorage.removeItem('pawwell_admin_user');
  localStorage.removeItem('pawwell_admin_role');
}
</script>

</body>
</html>
