<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawWell - Redirecting to your regional site...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .container {
            padding: 2rem;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .paw {
            font-size: 3rem;
            margin: 0 0.5rem;
        }
        p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        a {
            color: #ffd700;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        // 地区检测与跳转
        (function() {
            const lang = navigator.language.toLowerCase();
            const href = window.location.href;
            
            // 如果已经在子目录，不跳转
            if (href.includes('/AU/') || href.includes('/US/') || href.includes('/UK/')) {
                return;
            }
            
            // 澳洲检测
            if (lang.includes('en-au') || lang.includes('au')) {
                window.location.replace('/AU/');
                return;
            }
            
            // 美国检测（未来扩展）
            if (lang.includes('en-us') || lang.includes('us')) {
                window.location.replace('/AU/'); // 暂时先到AU
                return;
            }
            
            // 英国检测（未来扩展）
            if (lang.includes('en-gb') || lang.includes('gb') || lang.includes('uk')) {
                window.location.replace('/AU/'); // 暂时先到AU
                return;
            }
            
            // 默认到AU
            window.location.replace('/AU/');
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="paw">🐾</span>
            PawWell
            <span class="paw">🐾</span>
        </div>
        <p>Detecting your location...</p>
        <p>If not redirected automatically, <a href="/AU/">click here to enter Australian site</a></p>
    </div>
</body>
</html>
