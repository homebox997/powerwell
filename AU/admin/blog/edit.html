<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新建博客文章 - PawWell</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background: #f5f5f7;
  min-height: 100vh;
  color: #1d1d1f;
}
.top-bar {
  background: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid #e5e5e7;
}
.back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #0071e3; padding: 0; line-height: 1; }
.top-title { font-size: 18px; font-weight: 600; flex: 1; }
.container { padding: 20px; max-width: 600px; margin: 0 auto; }
.field { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.field-label { font-size: 13px; color: #86868b; margin-bottom: 6px; display: block; }
.field-input, .field-select, .field-textarea {
  width: 100%; border: none; outline: none; font-size: 16px;
  padding: 4px 0; background: transparent; font-family: inherit;
}
.field-textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
.submit-btn {
  width: 100%; background: #0071e3; color: white; border: none;
  border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 600;
  cursor: pointer; margin-top: 12px;
}
.submit-btn:active { background: #005bb5; }
.submit-btn:disabled { background: #86868b; }
.toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
  border-radius: 8px; font-size: 14px; z-index: 100; display: none;
}
.toast.show { display: block; }
.msg-bar {
  background: #d4edda; color: #155724; padding: 12px 16px;
  border-radius: 8px; margin-bottom: 16px; display: none; font-size: 14px;
}
.msg-bar.error { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" onclick="window.location.href='/AU/admin/index.html'">&#9001;</button>
  <div class="top-title">新建博客文章</div>
</div>
<div class="container">
  <div class="msg-bar" id="msgBar"></div>
  <form id="dataForm">
    
    <div class="field">
      <label class="field-label">标题 *</label>
      <input class="field-input" type="text" name="title" required placeholder="如：老年犬关节炎护理指南">
    </div>
    <div class="field">
      <label class="field-label">分类 *</label>
      <select class="field-select" name="category" required>
        <option value="">请选择</option><option value="Health Case">Health Case</option><option value="Tips">Tips</option><option value="Q&A">Q&A</option><option value="Reviews">Reviews</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">摘要</label>
      <textarea class="field-textarea" name="summary"  placeholder="200字以内的简要介绍"></textarea>
    </div>
    <div class="field">
      <label class="field-label">正文内容 *</label>
      <textarea class="field-textarea" name="content" required placeholder="详细正文..."></textarea>
    </div>
    <div class="field">
      <label class="field-label">标签(逗号分隔)</label>
      <input class="field-input" type="text" name="tags"  placeholder="如：关节炎,老年犬">
    </div>
    <div class="field">
      <label class="field-label">封面图URL</label>
      <input class="field-input" type="text" name="coverImage"  placeholder="https://...">
    </div>
    <div class="field">
      <label class="field-label">作者</label>
      <input class="field-input" type="text" name="author"  placeholder="署名">
    </div>
    <div class="field">
      <label class="field-label">发布日期</label>
      <input class="field-input" type="date" name="publishedAt"  placeholder="">
    </div>
    <div class="field">
      <label class="field-label">状态</label>
      <select class="field-select" name="status" >
        <option value="">请选择</option><option value="Draft">Draft</option><option value="Published">Published</option>
      </select>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">保存</button>
  </form>
</div>
<div class="toast" id="toast"></div>
<script>
// ===== 配置 =====
const CONFIG = {
  contentType: 'blog',
  notionDbId: '3970556c-dfbd-81db-abaa-ee829bb7c351',
  supabaseTable: 'blog_articles',
  notionToken: 'ntn_b1433198525X3xFz2UNpf0I17XenT22UCC4E32kDvYI5EZ',
  supabaseUrl: 'https://cbbaejwbkenrutmgqikt.supabase.co',
  serviceKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNiYmFlandia2VucnV0bWdxaWt0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk5NzU3NCwiZXhwIjoyMDk4NTczNTc0fQ.1N3D6ahkkxYe6ykxphk_jJ4BHHshmcbTe-IrDIw6F64',
  extraNotion: {"\u6765\u6e90": {"select": {"name": "Manual"}}}
};

// ===== 检查登录 =====
const user = localStorage.getItem('pawwell_admin_user');
if (!user) window.location.href = '/AU/admin/login.html';

// ===== 工具函数 =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function showMsg(msg, isError=false) {
  const m = document.getElementById('msgBar');
  m.textContent = msg; m.className = 'msg-bar' + (isError ? ' error' : '');
  m.style.display = 'block';
  setTimeout(() => m.style.display = 'none', 5000);
}
function slugify(text) {
  return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'untitled';
}

// ===== Notion 写入 =====
async function writeToNotion(formData) {
  const props = {};
  const fieldMap = window.FIELD_MAP_BLOG;
  for (const [formField, mapping] of Object.entries(fieldMap)) {
    const val = (formData.get(formField) || '').trim();
    if (!val) continue;
    const nf = mapping.notion;
    if (['title','question','name'].includes(formField))
      props[nf] = { title: [{ text: { content: val.slice(0,2000) } }] };
    else if (['summary','content','answer','author','petName','petBreed','age','diagnosis'].includes(formField))
      props[nf] = { rich_text: [{ text: { content: val.slice(0,10000) } }] };
    else if (['coverImage','affiliateUrl'].includes(formField))
      props[nf] = { url: val };
    else if (formField === 'publishedAt')
      props[nf] = { date: { start: val } };
    else if (['category','petType','status'].includes(formField))
      props[nf] = { select: { name: val } };
    else if (formField === 'tags')
      props[nf] = { multi_select: val.split(',').map(t => ({ name: t.trim() })).filter(t => t.name) };
  }
  // 补充额外字段
  for (const [k, v] of Object.entries(CONFIG.extraNotion)) { props[k] = v; }

  const res = await fetch('https://api.notion.com/v1/pages', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${CONFIG.notionToken}`,
      'Content-Type': 'application/json',
      'Notion-Version': '2022-06-28'
    },
    body: JSON.stringify({ parent: { database_id: CONFIG.notionDbId }, properties: props })
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error('Notion: ' + (err.message || res.status));
  }
  return await res.json();
}

// ===== Supabase 写入 =====
async function writeToSupabase(formData) {
  const row = { country: 'AU' };
  const fieldMap = window.FIELD_MAP_BLOG;
  for (const [formField, mapping] of Object.entries(fieldMap)) {
    const val = (formData.get(formField) || '').trim();
    if (!val) continue;
    const sf = mapping.supabase;
    if (['title','question','name','summary','content','answer','brand','petName','petBreed','age','diagnosis'].includes(formField))
      row[sf] = val;
    else if (['coverImage','affiliateUrl'].includes(formField)) row[sf] = val;
    else if (formField === 'publishedAt') row[sf] = val;
    else if (['category','petType','status'].includes(formField)) row[sf] = val;
    else if (formField === 'tags') row[sf] = val;
    else if (formField === 'priceRange') row[sf] = val;
    else if (formField === 'rating') row[sf] = parseFloat(val) || 0;
  }
  // slug（用于URL）
  const titleVal = formData.get('title') || formData.get('question') || formData.get('name') || '';
  if (titleVal) row.slug = slugify(titleVal);
  row.status = formData.get('status') || 'Draft';

  const res = await fetch(`${CONFIG.supabaseUrl}/rest/v1/${CONFIG.supabaseTable}`, {
    method: 'POST',
    headers: {
      'apikey': CONFIG.serviceKey,
      'Authorization': `Bearer ${CONFIG.serviceKey}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(row)
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('Supabase: ' + err.slice(0, 100));
  }
  // PostgreSQL 在 201 Created 时不返回 body
  if (res.status === 201) return { ok: true };
  return await res.json();
}

// ===== 提交处理 =====
document.getElementById('dataForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  const formData = new FormData(this);

  try {
    // 双写：Notion + Supabase（并行）
    const [notionRes, supabaseRes] = await Promise.all([
      writeToNotion(formData),
      writeToSupabase(formData)
    ]);
    showToast('\u2705 保存成功！已同步到 Notion + 网站数据库');
    this.reset();
  } catch(err) {
    showMsg('\u274c 保存失败: ' + err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '保存';
  }
});
</script>
</body>
</html>
