<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内容标签 - PawWell</title>
<style>* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; background: #f5f5f7; min-height: 100vh; color: #1d1d1f; }
.top-bar { background: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e5e5e7; }
.back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #0071e3; padding: 0; line-height: 1; }
.top-title { font-size: 18px; font-weight: 600; flex: 1; }
.container { padding: 20px; max-width: 600px; margin: 0 auto; }
.field { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.field-label { font-size: 13px; color: #86868b; margin-bottom: 6px; display: block; }
.field-input, .field-select, .field-textarea { width: 100%; border: none; outline: none; font-size: 16px; padding: 4px 0; background: transparent; font-family: inherit; }
.field-textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
.submit-btn { width: 100%; background: #0071e3; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }
.submit-btn:active { background: #005bb5; }
.submit-btn:disabled { background: #86868b; }
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 100; display: none; }
.toast.show { display: block; }
.msg-bar { background: #d4edda; color: #155724; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: none; font-size: 14px; }
.msg-bar.error { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" onclick="window.location.href='/AU/admin/index.html'">&#9001;</button>
  <div class="top-title">内容标签</div>
</div>
<div class="container">
  <div class="msg-bar" id="msgBar"></div>
  <form id="dataForm">
    <div class="field"><label class="field-label">标签名称 *</label><input class="field-input" type="text" name="tag_name" required placeholder="如：关节炎"></div>
<div class="field"><label class="field-label">标签类型</label><select class="field-select" name="tag_type" ><option value="">请选择</option><option value="病症">病症</option><option value="护理">护理</option><option value="饮食">饮食</option><option value="行为">行为</option><option value="产品">产品</option><option value="通用">通用</option></select></div>
<div class="field"><label class="field-label">显示颜色</label><select class="field-select" name="color" ><option value="">请选择</option><option value="蓝色">蓝色</option><option value="绿色">绿色</option><option value="橙色">橙色</option><option value="红色">红色</option><option value="紫色">紫色</option><option value="灰色">灰色</option></select></div>
<div class="field"><label class="field-label">排序序号</label><input class="field-input" type="text" name="sort_order"  placeholder="数字，越小越靠前"></div>
<div class="field"><label class="field-label">标签描述</label><textarea class="field-textarea" name="description"  placeholder="简要说明..."></textarea></div>

    <button type="submit" class="submit-btn" id="submitBtn">保存</button>
  </form>
</div>
<div class="toast" id="toast"></div>
<script>
var CONFIG = {
  notionDbId: '3970556c-dfbd-8195-afcb-c6c119430969',
  notionTitleCol: '标签名',
  supabaseTable: 'content_tags',
  notionToken: 'ntn_b1433198525X3xFz2UNpf0I17XenT22UCC4E32kDvYI5EZ',
  supabaseUrl: 'https://cbbaejwbkenrutmgqikt.supabase.co',
  serviceKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNiYmFlandia2VucnV0bWdxaWt0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjk5NzU3NCwiZXhwIjoyMDk4NTczNTc0fQ.1N3D6ahkkxYe6ykxphk_jJ4BHHshmcbTe-IrDIw6F64'
};

var user = localStorage.getItem('pawwell_admin_user');
if (!user) window.location.href = '/AU/admin/login.html';

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 2500);
}
function showMsg(msg, isError) {
  var m = document.getElementById('msgBar');
  m.textContent = msg; m.className = 'msg-bar' + (isError ? ' error' : '');
  m.style.display = 'block';
  setTimeout(function() { m.style.display = 'none'; }, 5000);
}

var richTextFields = new Set(["tag_name", "sort_order", "description"]);
var urlFields = new Set([]);
var selectFields = new Set(["tag_type", "color"]);
var multiFields = new Set([]);
var numFields = new Set([]);
var notionSchema = {"tag_name": "tag_name", "tag_type": "tag_type", "color": "color", "sort_order": "sort_order", "description": "description"};
var supabaseColMap = {"tag_name": "tag_name", "tag_type": "tag_type", "color": "color", "sort_order": "sort_order", "description": "description"};
var extraNotion = {};
var supabaseExtraDefaults = {"name": "tag_name"};

function buildNotionProps(formData) {
  var props = {};
  var tag_name = (formData.get('tag_name')||'').trim();
  var tag_type = (formData.get('tag_type')||'').trim();
  var color = (formData.get('color')||'').trim();
  var sort_order = (formData.get('sort_order')||'').trim();
  var description = (formData.get('description')||'').trim();

  if (tag_name) props['标签名'] = { title: [{ text: { content: tag_name.slice(0,2000) } }] };
  if (tag_type) props['类型'] = { rich_text: [{ text: { content: tag_type.slice(0,2000) } }] };
  if (color) props['颜色'] = { rich_text: [{ text: { content: color.slice(0,2000) } }] };
  if (sort_order) props['排序'] = { rich_text: [{ text: { content: sort_order.slice(0,2000) } }] };
  if (description) props['描述'] = { rich_text: [{ text: { content: description.slice(0,10000) } }] };
  return props;
};
  for (var fname in notionSchema) {
    var nfield = notionSchema[fname];
    var val = (formData.get(fname) || '').trim();
    if (!val) continue;
    if (nfield === CONFIG.notionTitleCol) {
      props[nfield] = { title: [{ text: { content: val.slice(0,2000) } }] };
    } else if (richTextFields.has(fname)) {
      props[nfield] = { rich_text: [{ text: { content: val.slice(0,10000) } }] };
    } else if (urlFields.has(fname)) {
      props[nfield] = { url: val };
    } else if (selectFields.has(fname)) {
      props[nfield] = { select: { name: val } };
    } else if (multiFields.has(fname)) {
      var items = val.split(',').map(function(t) { return { name: t.trim() }; }).filter(function(t) { return t.name; });
      if (items.length) props[nfield] = { multi_select: items };
    } else {
      props[nfield] = { rich_text: [{ text: { content: val.slice(0,2000) } }] };
    }
  }
  for (var k in extraNotion) props[k] = extraNotion[k];
  return props;
}

function buildSupabaseRow(formData) {
  var row = { country: 'AU' };
  for (var fname in supabaseColMap) {
    var sc = supabaseColMap[fname];
    var val = (formData.get(fname) || '').trim();
    if (!val) continue;
    if (numFields.has(fname)) {
      var n = parseFloat(val);
      if (!isNaN(n)) row[sc] = n;
    } else if (multiFields.has(fname)) {
      var items = val.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
      if (items.length) row[sc] = items;
    } else {
      row[sc] = val;
    }
  }
  // 应用默认必填字段（从表单值派生）
  for (var sc in supabaseExtraDefaults) {
    if (!row[sc]) {
      var src = supabaseExtraDefaults[sc];
      var v = (formData.get(src) || '').trim();
      if (v) row[sc] = v;
    }
  }
  // slug
  var titleVal = formData.get('title') || formData.get('tag_name') ||
    formData.get('breed_name_cn') || formData.get('breed_name_en') ||
    formData.get('character_name') || formData.get('metric_name') || '';
  if (titleVal) row.slug = slugify(titleVal);
  if (!row.status) row.status = 'Draft';
  return row;
}

async function writeToNotion(formData) {
  if (!CONFIG.notionDbId) throw new Error('Notion DB not configured');
  var props = buildNotionProps(formData);
  var res = await fetch('https://api.notion.com/v1/pages', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + CONFIG.notionToken, 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' },
    body: JSON.stringify({ parent: { database_id: CONFIG.notionDbId }, properties: props })
  });
  if (!res.ok) {
    var err = await res.json();
    throw new Error('Notion: ' + (err.message || res.status));
  }
  return await res.json();
}

async function writeToSupabase(formData) {
  var row = buildSupabaseRow(formData);
  var res = await fetch(CONFIG.supabaseUrl + '/rest/v1/' + CONFIG.supabaseTable, {
    method: 'POST',
    headers: { 'apikey': CONFIG.serviceKey, 'Authorization': 'Bearer ' + CONFIG.serviceKey, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(row)
  });
  if (!res.ok) {
    var err = await res.text();
    throw new Error('Supabase: ' + err.slice(0, 150));
  }
  if (res.status === 201) return { ok: true };
  return await res.json();
}

document.getElementById('dataForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  var fd = new FormData(this);
  try {
    await Promise.all([writeToNotion(fd), writeToSupabase(fd)]);
    showToast('\u2705 保存成功！已同步 Notion + 数据库');
    this.reset();
  } catch(err) {
    showMsg('\u274c 保存失败: ' + err.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '保存';
  }
});
</script>
</body>
</html>
